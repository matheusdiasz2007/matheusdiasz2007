name: Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Gerar snake
        uses: Platane/snk@v3
        with:
          github_user_name: Matheusdiasz2007
          outputs: |
            dist/matheus-snake.svg

      - name: Publicar
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
###
